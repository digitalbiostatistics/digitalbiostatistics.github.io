- quote: "Associate with those who will make a better man of you. Welcome those whom you yourself can improve."
  author: "Seneca"

- quote: "Strive to elevate the conversation of those around you through your own example."
  author: "Epictetus"

- quote: "Man can only become man by education. He is merely what education makes of him."
  author: "Immanuel Kant"

- quote: "The real crisis is a crisis of intelligence."
  author: "Emilio Lledo"