<div class="portrait-wrapper">

  {% if include.link %}
    <a
      href="{{ include.link | escape }}"
      class="portrait"
      data-style="{{ include.style }}"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Open profile of {{ include.name }}"
    >
  {% else %}
    <div
      class="portrait"
      data-style="{{ include.style }}"
    >
  {% endif %}

    {% if include.image %}
      <img
        src="{{ include.image | relative_url | uri_escape }}"
        class="portrait-image"
        alt="Portrait of {{ include.name }}"
        loading="lazy"
        {% include fallback.html %}
      >
    {% endif %}

    {% if include.name %}
      <span class="portrait-name">
        {{ include.name }}
      </span>
    {% endif %}

    {% if include.affiliation %}
      <span class="portrait-affiliation">
        {{ include.affiliation }}
      </span>
    {% endif %}

  {% if include.link %}
    </a>
  {% else %}
    </div>
  {% endif %}

</div>
