{% if page.translation_key == "contact" %}

  <style>
    .visitor-counter-card {
      position: relative;
      width: min(100%, 760px);
      margin: 38px auto 20px;
      padding: clamp(26px, 5vw, 44px);
      box-sizing: border-box;
      overflow: hidden;
      text-align: center;
      border: 1px solid rgba(84, 127, 157, 0.18);
      border-radius: 24px;
      background:
        radial-gradient(
          circle at 90% 10%,
          rgba(84, 127, 157, 0.14),
          transparent 34%
        ),
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.98),
          rgba(244, 249, 252, 0.96)
        );
      box-shadow:
        0 20px 48px rgba(32, 49, 60, 0.09),
        0 4px 12px rgba(32, 49, 60, 0.04);
    }

    .visitor-counter-card::before {
      content: "";
      position: absolute;
      top: -90px;
      right: -70px;
      width: 210px;
      height: 210px;
      border: 1px solid rgba(84, 127, 157, 0.12);
      border-radius: 50%;
      pointer-events: none;
    }

    .visitor-counter-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: rgba(84, 127, 157, 0.11);
      color: #426d8a;
      font-size: 1.5rem;
    }

    .visitor-counter-title {
      position: relative;
      margin: 0 0 10px;
      font-size: clamp(1.35rem, 3vw, 1.8rem);
      line-height: 1.25;
      color: #243946;
    }

    .visitor-counter-description {
      position: relative;
      max-width: 560px;
      margin: 0 auto 26px;
      font-size: 0.98rem;
      line-height: 1.65;
      color: #536570;
    }

    .visitor-counter-link {
      position: relative;
      display: inline-block;
      padding: 14px;
      border: 1px solid rgba(84, 127, 157, 0.16);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 8px 22px rgba(32, 49, 60, 0.07);
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .visitor-counter-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 13px 28px rgba(32, 49, 60, 0.12);
    }

    .visitor-counter-image {
      display: block;
      max-width: 100%;
      height: auto;
      border: 0;
    }

    .visitor-counter-note {
      position: relative;
      margin: 20px 0 0;
      font-size: 0.82rem;
      color: #71808a;
    }

    @media screen and (max-width: 600px) {
      .visitor-counter-card {
        padding: 28px 18px;
        border-radius: 20px;
      }

      .visitor-counter-link {
        width: 100%;
        box-sizing: border-box;
        overflow-x: auto;
      }

      .visitor-counter-image {
        margin: auto;
      }
    }
  </style>

  <section
    class="visitor-counter-card"
    aria-labelledby="visitor-counter-title"
  >
    <div class="visitor-counter-icon" aria-hidden="true">
      🌍
    </div>

    <h2
      class="visitor-counter-title"
      id="visitor-counter-title"
    >
      Visitors Around the World
    </h2>

    <p class="visitor-counter-description">
      Discover the countries and regions from which people are visiting
      the Digital Biostatistics website.
    </p>

    <a
      class="visitor-counter-link"
      href="https://info.flagcounter.com/LbmZ"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="View detailed visitor statistics"
    >
      <img
        class="visitor-counter-image"
        src="https://s05.flagcounter.com/count2/LbmZ/bg_FFFFFF/txt_263B49/border_FFFFFF/columns_2/maxflags_12/viewers_0/labels_1/pageviews_1/flags_0/percent_0/"
        alt="Visitor statistics by country"
      >
    </a>

    <p class="visitor-counter-note">
      Statistics cover visits across the complete website.
    </p>
  </section>

{% else %}

  <!--
    Invisible instance of the same counter.
    It allows visits to every page to be included in the global count.
  -->
  <img
    src="https://s05.flagcounter.com/count2/LbmZ/bg_FFFFFF/txt_000000/border_FFFFFF/columns_1/maxflags_1/viewers_0/labels_0/pageviews_0/flags_0/percent_0/"
    alt=""
    aria-hidden="true"
    width="1"
    height="1"
    style="
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    "
  >

{% endif %}
